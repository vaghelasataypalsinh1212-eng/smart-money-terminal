// ══════════════════════════════════════════════════════════
// SAFE MATH — FIX: safeNum handles strings properly
// ══════════════════════════════════════════════════════════
const safeNum  =(v,fb=0)=>{const n=Number(v);return(v===null||v===undefined||v===""||isNaN(n))?fb:n;};
const safeDiv  =(a,b,fb=0)=>{const bn=safeNum(b,0);return(!bn||isNaN(safeNum(a,0)))?fb:safeNum(a,0)/bn;};
const clamp    =(v,mn,mx)=>Math.min(mx,Math.max(mn,isNaN(v)?mn:v));
const safePct  =v=>clamp(safeNum(v,0),0,100);
const round2   =v=>Math.round(safeNum(v)*100)/100;
const safeFixed=(v,d=0)=>safeNum(v,0).toFixed(d);
const safeInc  =(s,sub)=>typeof s==="string"&&s.includes(sub);
const fmt      =n=>safeNum(n,0).toLocaleString("en-IN");
const norm     =(v,max)=>safePct(safeDiv(safeNum(v,0),Math.max(safeNum(max,1),1))*100);
const msToNext =()=>{const n=new Date();return(60-n.getSeconds())*1000-n.getMilliseconds();};
const tNow     =()=>new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});

// 1. REGIME
function computeRegime({vix,ivTrend,oiChange,pcr,fiiRatio,giftGap,adx}){
  let s=0;
  const v=safeNum(vix,16),p=safeNum(pcr,1),fr=safeNum(fiiRatio,50),gap=safeNum(giftGap,0);
  if(v<14)s+=2;else if(v>20)s-=2;else if(v>17)s-=1;
  if(ivTrend==="falling")s+=2;else s-=2;
  if(oiChange==="price_up_oi_up")s+=2;else if(oiChange==="price_down_oi_up")s-=2;
  else if(oiChange==="price_up_oi_down")s+=0.5;else s-=0.5;
  if(p>1.3)s+=1;else if(p<0.7)s-=1;
  if(fr>60)s+=2;else if(fr<40)s-=2;
  if(gap>50)s+=1;else if(gap<-50)s-=1;
  if(adx==="strong")s+=1;else if(adx==="weak")s-=0.5;
  const mk=(regime,color,code,direction,desc,strat)=>({regime,color,code,direction,score:s,description:desc,strategy:strat,isBull:direction==="bull",isBear:direction==="bear"});
  if(s>=5) return mk("TRENDING BULL",T.green,"TB","bull","Strong institutional accumulation. Follow trend aggressively.","BUY DIPS");
  if(s>=2) return mk("MILD BULL","#66ffbb","MB","bull","Cautious buying. Confirm with structure.","BUY PULLBACKS");
  if(s<=-5)return mk("TRENDING BEAR",T.red,"TBR","bear","Strong institutional distribution. Follow trend.","SELL RALLIES");
  if(s<=-2)return mk("MILD BEAR","#ff6688","MBR","bear","Cautious selling. Confirm with structure.","SELL RESISTANCE");
  return       mk("RANGE BOUND",T.amber,"RB","neutral","Institutional indecision. Fade extremes only.","RANGE TRADE");
}

// 2. GEX — FIX: explicit Number() conversion on OI inputs
function computeGEX({callOI,putOI,gamma,spot}){
  const g=safeNum(gamma,0.003),s=safeNum(spot,24000);
  const coi=safeNum(callOI,0),poi=safeNum(putOI,0);
  const cg=coi*g*s*s*65/1e7,pg=poi*g*s*s*65/1e7,net=cg-pg;
  const denom=Math.max(Math.abs(cg),Math.abs(pg),1);
  const n=clamp(safeDiv(net,denom)*100,-100,100);
  return{gex:fmt(Math.round(net)),gexRaw:Math.round(net),callGex:fmt(Math.round(cg)),putGex:fmt(Math.round(pg)),norm:n,color:n>0?T.green:T.red,regime:n>20?"LONG_GAMMA":n<-20?"SHORT_GAMMA":"NEUTRAL"};
}

// 3. FII
function computeFII({fiiNet,fiiRatio,fiiMTD}){
  const net=safeNum(fiiNet,0),ratio=safeNum(fiiRatio,50),mtd=safeNum(fiiMTD,0);
  let s=0;
  if(Math.abs(net)>2000)s+=3;else if(Math.abs(net)>500)s+=1;
  if(ratio>65)s+=3;else if(ratio<35)s-=3;else s+=safeDiv(ratio-50,10);
  if(mtd<-5000)s-=2;else if(mtd>5000)s+=2;
  return{dir:net>0?"ACCUMULATING":"DISTRIBUTING",intensity:Math.abs(s)>4?"AGGRESSIVE":Math.abs(s)>2?"MODERATE":"PASSIVE",score:safePct(Math.abs(s)*14),color:net>0?T.green:T.red,bias:ratio>60?"bull":ratio<40?"bear":"neutral"};
}

// 4. TRAP
function computeTrap({giftGap,oiChange,ivTrend,pcr,fiiRatio}){
  const gap=safeNum(giftGap,0),p=safeNum(pcr,1),fr=safeNum(fiiRatio,50);
  let b=0,br=0;
  if(gap>100)b+=30;if(oiChange==="price_up_oi_down")b+=25;
  if(ivTrend==="rising"&&gap>0)b+=20;if(p<0.7)b+=15;if(fr<40&&gap>50)b+=10;
  if(gap<-100)br+=30;if(oiChange==="price_down_oi_down")br+=25;
  if(ivTrend==="falling"&&gap<0)br+=20;if(p>1.4)br+=15;if(fr>60&&gap<-50)br+=10;
  return{bull:safePct(b),bear:safePct(br),dominant:b>br?"BULL TRAP":br>b?"BEAR TRAP":"CLEAN",color:b>60||br>60?T.red:b>35||br>35?T.amber:T.green};
}

// 5. ABSORPTION
function computeAbsorption({oiChange,ivTrend,fiiNet,diiNet}){
  const fn=safeNum(fiiNet,0),dn=safeNum(diiNet,0);let a=0;
  if(oiChange==="price_down_oi_down")a+=40;if(oiChange==="price_up_oi_down")a+=30;
  if(Math.abs(fn)>500&&Math.abs(dn)>300&&((fn>0&&dn<0)||(fn<0&&dn>0)))a+=30;
  if(ivTrend==="falling")a+=20;
  const v=safePct(a);
  return{val:v,type:v>60?"STRONG ABSORPTION":v>30?"PARTIAL ABSORPTION":"NO ABSORPTION",color:v>60?T.green:v>30?T.amber:T.muted};
}

// 6. DELTA
function computeDelta({callDelta,putDelta,callOI,putOI}){
  const cd=safeNum(callDelta,0.5),pd=safeNum(putDelta,0.5);
  const co=Math.max(1,safeNum(callOI,1)),po=Math.max(1,safeNum(putOI,1));
  const ir=clamp(safeDiv(cd*co-pd*po,cd*co+pd*po)*100,-100,100);
  return{imb:safeFixed(ir,1),imbRaw:ir,dir:ir>10?"CALL DOMINANT":ir<-10?"PUT DOMINANT":"BALANCED",color:ir>10?T.green:ir<-10?T.red:T.amber};
}

// 7. STRUCTURE
function computeStructure({currentPrice,atmStrike,highestCallOI,highestPutOI,oiChange,ivTrend}){
  const atm=safeNum(atmStrike,24000),price=safeNum(currentPrice,atm);
  const callW=safeNum(highestCallOI,atm+300),putW=safeNum(highestPutOI,atm-300);
  const range=Math.max(callW-putW,1),mid=putW+range/2;
  const pct=clamp(safeDiv(price-mid,range/2)*100,-100,100);
  const zone=pct>25?"PREMIUM":pct<-25?"DISCOUNT":"EQUILIBRIUM";
  const zC=zone==="PREMIUM"?T.red:zone==="DISCOUNT"?T.green:T.amber;
  let sig="NONE",sigC=T.muted;
  if(oiChange==="price_up_oi_up"&&ivTrend==="falling"){sig="BOS BULLISH";sigC=T.green;}
  else if(oiChange==="price_down_oi_up"&&ivTrend==="rising"){sig="BOS BEARISH";sigC=T.red;}
  else if(oiChange==="price_up_oi_down"&&ivTrend==="rising"){sig="CHOCH BEAR";sigC=T.amber;}
  else if(oiChange==="price_down_oi_down"&&ivTrend==="falling"){sig="CHOCH BULL";sigC=T.teal;}
  const internalLiq=Math.abs(price-mid)<range*0.15?"INTERNAL — Equilibrium.":price>mid?"EXTERNAL SELL-SIDE — Premium.":"EXTERNAL BUY-SIDE — Discount.";
  const trendState=oiChange==="price_up_oi_up"?"UPTREND":oiChange==="price_down_oi_up"?"DOWNTREND":oiChange==="price_up_oi_down"?"WEAK UP":"CORRECTION";
  return{zone,zoneColor:zC,pctFromMid:round2(pct),structureSignal:sig,structureColor:sigC,internalLiq,trendState,midPoint:Math.round(mid),callWall:callW,putWall:putW,range:Math.round(range)};
}

// 8. SWEEP
function computeSweep({giftGap,oiChange,ivTrend,pcr,fiiRatio,liquiditySweep}){
  const gap=safeNum(giftGap,0),p=safeNum(pcr,1);
  const bc=[gap>100,oiChange==="price_up_oi_down",ivTrend==="rising"&&gap>0,p<0.7,liquiditySweep==="above"||liquiditySweep==="both"];
  const sc=[gap<-100,oiChange==="price_down_oi_down",ivTrend==="falling"&&gap<0,p>1.4,liquiditySweep==="below"||liquiditySweep==="both"];
  const bs=bc.filter(Boolean).length,ss=sc.filter(Boolean).length;
  let type="NO SWEEP",score=0,color=T.muted;
  if(bs>=3){type="BUY-SIDE SWEEP";score=safePct(bs*20);color=T.red;}
  else if(ss>=3){type="SELL-SIDE SWEEP";score=safePct(ss*20);color=T.green;}
  else if(bs>=2||ss>=2){type="PARTIAL SWEEP";score=safePct(Math.max(bs,ss)*15);color=T.amber;}
  return{sweepType:type,sweepScore:score,sweepColor:color,confidence:score>60?"HIGH":score>30?"MEDIUM":"LOW",buyScore:bs,sellScore:ss};
}

// 9. MTF
function computeMTF({oiChange,ivTrend,pcr,fiiRatio,vix,giftGap,adx,callDelta,putDelta}){
  const gap=safeNum(giftGap,0),v=safeNum(vix,16),p=safeNum(pcr,1),fr=safeNum(fiiRatio,50),cd=safeNum(callDelta,0.5),pd=safeNum(putDelta,0.5);
  let s15=0;
  if(oiChange==="price_up_oi_up")s15+=2;else if(oiChange==="price_down_oi_up")s15-=2;
  if(fr>60)s15+=2;else if(fr<40)s15-=2;
  if(ivTrend==="falling")s15+=1;else s15-=1;
  if(gap>50)s15+=1;else if(gap<-50)s15-=1;
  const bias15m=s15>2?"BULLISH":s15<-2?"BEARISH":"NEUTRAL";
  let s5=0;
  if(cd>pd)s5+=2;else s5-=2;
  if(p>1.1)s5+=1;else if(p<0.8)s5-=1;
  if(v<14)s5+=1;else if(v>20)s5-=1;
  const conf5m=s5>1?"CONFIRM BULL":s5<-1?"CONFIRM BEAR":"NO CONFIRMATION";
  const exec1m=adx==="strong"&&Math.abs(gap)>30?"MOMENTUM — Enter on pullback":adx==="weak"?"CHOPPY — Wait":"MODERATE — Standard entry";
  const aligned=(bias15m==="BULLISH"&&conf5m==="CONFIRM BULL")||(bias15m==="BEARISH"&&conf5m==="CONFIRM BEAR");
  const execQ=aligned?90:bias15m==="NEUTRAL"?40:60;
  return{bias15m,conf5m,exec1m,aligned,execQuality:execQ,execColor:execQ>75?T.green:execQ>50?T.amber:T.red,b15Color:bias15m==="BULLISH"?T.green:bias15m==="BEARISH"?T.red:T.amber,c5Color:safeInc(conf5m,"BULL")?T.green:safeInc(conf5m,"BEAR")?T.red:T.amber};
}

// 10. CANDLE
function computeCandle({oiChange,ivTrend,giftGap,vix,pcr,callDelta,putDelta}){
  const gap=safeNum(giftGap,0),v=safeNum(vix,16),p=safeNum(pcr,1),cd=safeNum(callDelta,0.5),pd=safeNum(putDelta,0.5);
  const pts=[];let score=0;
  if(oiChange==="price_up_oi_up"&&ivTrend==="falling"&&gap>30){pts.push({name:"BULLISH ENGULFING",color:T.green,strength:85});score+=2;}
  if(oiChange==="price_down_oi_up"&&ivTrend==="rising"&&gap<-30){pts.push({name:"BEARISH ENGULFING",color:T.red,strength:85});score-=2;}
  if(Math.abs(gap)>100){pts.push({name:`DISPLACEMENT ${gap>0?"BULL":"BEAR"}`,color:gap>0?T.green:T.red,strength:75});score+=gap>0?1:-1;}
  if(p>1.4){pts.push({name:"REJECTION WICK (Bull)",color:T.teal,strength:70});score+=1;}
  if(p<0.65){pts.push({name:"REJECTION WICK (Bear)",color:T.orange,strength:70});score-=1;}
  if(cd>0.6&&oiChange==="price_up_oi_up"){pts.push({name:"MOMENTUM BULL",color:T.lime,strength:80});score+=2;}
  if(pd>0.6&&oiChange==="price_down_oi_up"){pts.push({name:"MOMENTUM BEAR",color:T.pink,strength:80});score-=2;}
  if(v>18&&Math.abs(gap)>80){pts.push({name:"IMBALANCE CANDLE",color:T.amber,strength:65});}
  const bias=score>1?"BULLISH":score<-1?"BEARISH":"NEUTRAL";
  return{patterns:pts.slice(0,4),candleScore:score,patternBias:bias,biasColor:bias==="BULLISH"?T.green:bias==="BEARISH"?T.red:T.amber};
}

// 11. ATR
function computeATR({vix,atmStrike}){
  const v=safeNum(vix,16),spot=safeNum(atmStrike,24000);
  const daily=Math.max(1,Math.round((v/100)*spot/Math.sqrt(252)));
  const state=v<14?"CONTRACTION":v>20?"EXPANSION":v>17?"ELEVATED":"NORMAL";
  return{dailyATR:daily,sessionATR:Math.round(daily*0.6),volState:state,volColor:state==="EXPANSION"?T.red:state==="ELEVATED"?T.amber:T.green,slBuffer:Math.round(daily*2),t1Buffer:Math.round(daily*1),t2Buffer:Math.round(daily*2),t3Buffer:Math.round(daily*3)};
}

// 12. VOLUME DELTA — FIX: DualBar bv+brv=0 edge case handled here
function computeVolumeDelta({buyVolume,sellVolume,totalVolume,priceChange,atr=100}){
  const bv=safeNum(buyVolume,0),sv=safeNum(sellVolume,0),tv=Math.max(safeNum(totalVolume,bv+sv),1),pc=safeNum(priceChange,0),at=Math.max(1,safeNum(atr,100));
  const cvd=bv-sv,buyPct=safePct(safeDiv(bv,tv)*100),sellPct=safePct(safeDiv(sv,tv)*100);
  const imbalance=safeDiv(cvd,tv)*100,strength=safePct(Math.abs(imbalance));
  let bias="NEUTRAL",biasColor=T.amber;
  if(imbalance>15){bias="BULL";biasColor=T.green;}else if(imbalance<-15){bias="BEAR";biasColor=T.red;}
  const priceDir=pc>at*0.3?"UP":pc<-at*0.3?"DOWN":"FLAT";

  const divergence=priceDir==="UP"&&cvdDir==="DOWN"?{type:"BEARISH_DIV",color:T.red}:priceDir==="DOWN"&&cvdDir==="UP"?{type:"BULLISH_DIV",color:T.green}:null;
  let absorption="NONE";

  if(buyPct>65&&pc<at*0.2)absorption="BUY ABSORPTION (Bearish)";
  return{cvd:Math.round(cvd),buyPct:round2(buyPct),sellPct:round2(sellPct),bias,biasColor,strength,divergence,absorption,signal:divergence?`⚡ ${divergence.type}`:absorption!=="NONE"?`🔄 ${absorption}`:`${bias} flow (${strength.toFixed(0)}%)`};

// 13. VWAP
function computeVWAP({currentPrice,vwap,stdDev=0,atr=100}){
  const price=safeNum(currentPrice,0),vw=safeNum(vwap,price),sd=safeNum(stdDev,0),at=Math.max(1,safeNum(atr,100));
  if(vw===0)return{zone:"AT_VWAP",bias:"NEUTRAL",biasColor:T.amber,deviation:0,deviationPct:0,band:"NONE",signal:"VWAP not set",meanReversion:false,trendFollow:false};
  const deviation=round2(price-vw),deviationPct=round2(safeDiv(deviation,vw)*100);
  const zone=Math.abs(deviation)<at*0.15?"AT_VWAP":deviation>0?"ABOVE_VWAP":"BELOW_VWAP";
  let band="VWAP";
  if(sd>0){if(price>vw+2*sd)band="UPPER_2SD";else if(price>vw+sd)band="UPPER_1SD";else if(price<vw-2*sd)band="LOWER_2SD";else if(price<vw-sd)band="LOWER_1SD";else band="INSIDE_1SD";}
  let bias="NEUTRAL",biasColor=T.amber;
  if(zone==="ABOVE_VWAP"){bias="BULL";biasColor=T.green;}
  if(zone==="BELOW_VWAP"){bias="BEAR";biasColor=T.red;}
  const meanReversion=band==="UPPER_2SD"||band==="LOWER_2SD";
  const trendFollow=zone!=="AT_VWAP"&&(band==="UPPER_1SD"||band==="LOWER_1SD"||band==="INSIDE_1SD");
  const signal=meanReversion?(zone==="ABOVE_VWAP"?"⬇ +2SD — Mean reversion SHORT possible":"⬆ -2SD — Mean reversion LONG possible"):trendFollow?(zone==="ABOVE_VWAP"?"▲ Above VWAP — Buy dips.":"▼ Below VWAP — Sell rallies."):"◆ At VWAP — Wait for break.";
  return{zone,bias,biasColor,deviation,deviationPct,band,signal,meanReversion,trendFollow};
}

// 14. PREMIUM/DISCOUNT
function computePremDisc({rangeHigh,rangeLow,currentPrice,trend="neutral"}){
  const hi=safeNum(rangeHigh,0),lo=safeNum(rangeLow,0),price=safeNum(currentPrice,0);
  if(hi<=lo||hi===0)return{zone:"EQUILIBRIUM",zoneColor:T.amber,pctFromMid:0,tradeBias:{label:"Range not set",color:T.muted,action:"WAIT"},equilibrium:0,valid:false};
  const range=hi-lo,mid=lo+range/2,pct=clamp(safeDiv(price-mid,range/2)*100,-100,100);
  const zone=pct>25?"PREMIUM":pct<-25?"DISCOUNT":"EQUILIBRIUM";
  const zC=zone==="PREMIUM"?T.red:zone==="DISCOUNT"?T.green:T.amber;
  let tradeBias;
  if(zone==="DISCOUNT"&&trend==="bull")tradeBias={label:"BUY ZONE — Discount + Bull",color:T.green,action:"LONG"};
  else if(zone==="PREMIUM"&&trend==="bear")tradeBias={label:"SELL ZONE — Premium + Bear",color:T.red,action:"SHORT"};
  else if(zone==="DISCOUNT")tradeBias={label:"DISCOUNT — Watch for long",color:"#66ffbb",action:"WATCH_LONG"};
  else if(zone==="PREMIUM")tradeBias={label:"PREMIUM — Watch for short",color:"#ff6688",action:"WATCH_SHORT"};
  else tradeBias={label:"EQUILIBRIUM — Wait",color:T.amber,action:"WAIT"};
  return{zone,zoneColor:zC,pctFromMid:round2(pct),tradeBias,equilibrium:Math.round(mid),valid:true};
}

// 15. SESSION
function computeSession(nowDate){
  const tot=nowDate.getHours()*60+nowDate.getMinutes();
  const cur=SESSION_DEFS.find(s=>tot>=s.range[0]&&tot<s.range[1])||SESSION_DEFS[SESSION_DEFS.length-1];
  return{sessions:SESSION_DEFS,current:cur,minsLeft:Math.max(0,cur.range[1]-tot)};
}

// 20. MASTER SCORE ENGINE
function biasToDelta(b=""){
  const s=String(b).toUpperCase();
  if(s.includes("BULL")||s.includes("BUY")||s.includes("LONG")||s==="ACCUMULATING")return 1;
  if(s.includes("BEAR")||s.includes("SELL")||s.includes("SHORT")||s==="DISTRIBUTING")return -1;
  return 0;
}
const W={REGIME:10,SWEEP:8,FII:9,DELTA:7,ABSORPTION:6,STRUCTURE:8,MTF:9,PREM:7,CANDLE:5,VWAP:6,PCR:5,TRAP:8};

function computeMasterScore({regimeDirection,regimeScore,sweepScore,sweepType,fiiDir,fiiScore,deltaImbDir,deltaImbRaw,absorbVal,absorbType,structureSignal,structureZone,mtfBias15m,mtfExecQuality,mtfAligned,premDiscAction,premDiscValid,candlePatternBias,candleScore,vwapBias,vwapZone,vwapMeanReversion,atrVolState,trapBull,trapBear,trapDominant,pcr,volumeDeltaBias,volumeDeltaStrength}){
  const sigs=[];
  sigs.push({k:"REGIME",  delta:biasToDelta(regimeDirection)*clamp(Math.abs(safeNum(regimeScore,0))/5,0,1),w:W.REGIME});
  const swRaw=safeNum(sweepScore,0)/100;
  sigs.push({k:"SWEEP",   delta:safeInc(sweepType,"BUY-SIDE")?-swRaw:safeInc(sweepType,"SELL-SIDE")?swRaw:0,w:W.SWEEP});
  sigs.push({k:"FII",     delta:biasToDelta(fiiDir)*safeNum(fiiScore,0)/100,w:W.FII});
  sigs.push({k:"DELTA",   delta:biasToDelta(deltaImbDir)*clamp(Math.abs(safeNum(deltaImbRaw,0))/100,0,1),w:W.DELTA});
  const absDir=safeInc(absorbType,"SELL")?1:safeInc(absorbType,"BUY")?-1:0;
  sigs.push({k:"ABSORB",  delta:absDir*safeNum(absorbVal,0)/100,w:W.ABSORPTION});
  const strD=safeInc(structureSignal,"BULL")?1:safeInc(structureSignal,"BEAR")?-1:0;
  const zoneD=structureZone==="DISCOUNT"?0.3:structureZone==="PREMIUM"?-0.3:0;
  sigs.push({k:"STRUCT",  delta:clamp(strD+zoneD,-1,1),w:W.STRUCTURE});
  sigs.push({k:"MTF",     delta:biasToDelta(mtfBias15m)*safeNum(mtfExecQuality,50)/100,w:mtfAligned?W.MTF:W.MTF*0.4});
  const pdD=premDiscAction==="LONG"||premDiscAction==="WATCH_LONG"?1:premDiscAction==="SHORT"||premDiscAction==="WATCH_SHORT"?-1:0;
  sigs.push({k:"P/D",     delta:pdD*(premDiscValid?0.8:0),w:W.PREM});
  sigs.push({k:"CANDLE",  delta:biasToDelta(candlePatternBias)*clamp(Math.abs(safeNum(candleScore,0))/4,0,1),w:W.CANDLE});
  const vwD=vwapMeanReversion?-biasToDelta(vwapBias):biasToDelta(vwapBias);
  sigs.push({k:"VWAP",    delta:vwD*(vwapZone!=="AT_VWAP"?0.8:0.2),w:W.VWAP});
  const pcrV=safeNum(pcr,1),pcrD=pcrV>1.3?1:pcrV<0.7?-1:0,pcrC=pcrV>1.4||pcrV<0.6?0.9:pcrV>1.3||pcrV<0.7?0.5:0;
  sigs.push({k:"PCR",     delta:pcrD*pcrC,w:W.PCR});
  const maxTrap=Math.max(safeNum(trapBull,0),safeNum(trapBear,0))/100;
  sigs.push({k:"TRAP",    delta:maxTrap*-0.3,w:W.TRAP});
  const volMod=atrVolState==="CONTRACTION"?0.5:atrVolState==="EXPANSION"?1.2:1.0;
  let wSum=0,effW=0;
  for(const s of sigs){wSum+=safeNum(s.delta,0)*safeNum(s.w,1);effW+=safeNum(s.w,1);}
  wSum*=clamp(volMod,0.4,1.5);
  const netScore=clamp(safeDiv(wSum,Math.max(effW,1))*100,-100,100);
  const bias=netScore>=20?"BULLISH":netScore<=-20?"BEARISH":"SIDEWAYS";
  const biasColor=bias==="BULLISH"?T.green:bias==="BEARISH"?T.red:T.amber;
  const trapQ=100-Math.max(safeNum(trapBull,0),safeNum(trapBear,0));
  const volQ=atrVolState==="CONTRACTION"?30:atrVolState==="EXPANSION"?90:70;
  const execQ=Math.round(safeNum(mtfExecQuality,50)*0.5+trapQ*0.3+volQ*0.2);
  const conf=Math.round(clamp(Math.abs(netScore)*0.8,5,94));
  const instP=Math.round(safeNum(fiiScore,0)*0.5+safeNum(absorbVal,0)*0.25+safeNum(sweepScore,0)*0.25);
  const liqScore=Math.round(safeNum(sweepScore,0)*0.4+safeNum(absorbVal,0)*0.3);
  const action=bias==="BULLISH"&&execQ>=70?"STRONG LONG":bias==="BEARISH"&&execQ>=70?"STRONG SHORT":bias==="BULLISH"&&execQ>=50?"BUY PULLBACK":bias==="BEARISH"&&execQ>=50?"SELL RALLY":execQ<40?"WAIT":netScore>0?"CAUTIOUS LONG":"CAUTIOUS SHORT";
  const isGo=execQ>=60&&conf>=45&&liqScore<60&&bias!=="SIDEWAYS";
  return{netScore:round2(netScore),bias,biasColor,confidence:conf,confLevel:conf>=70?"HIGH":conf>=45?"MODERATE":"LOW",confColor:conf>=70?T.green:conf>=45?T.amber:T.red,execQuality:clamp(execQ,0,100),execColor:execQ>=70?T.green:execQ>=45?T.amber:T.red,instPressure:clamp(instP,0,100),instDir:biasToDelta(fiiDir),liqScore:clamp(liqScore,0,100),liqCondition:liqScore>60?"ACTIVE MANIPULATION":liqScore>30?"MODERATE ACTIVITY":"CLEAN",volRegime:atrVolState,condition:atrVolState==="CONTRACTION"?"COILING":atrVolState==="EXPANSION"?"BREAKOUT":bias==="SIDEWAYS"?"RANGING":`${bias} TREND`,trapDominant:trapDominant||"CLEAN",trapMax:Math.round(Math.max(safeNum(trapBull,0),safeNum(trapBear,0))),action,isGo,goColor:isGo?T.green:T.red,sigs};
}

  lines.push(`📈 VOLATILITY: ${volState||"NORMAL"} | ATR ${dailyATR||"—"}pts | ${volMsg}`);
  if(sessionLabel)lines.push(`⏰ SESSION: ${sessionLabel} [${sessionQuality}] — ${sessionInst} ${sessionMinsLeft}min remaining.`);
  if(candlePatterns&&candlePatterns.length>0)lines.push(`🕯 PATTERNS: ${candlePatterns.map(p=>p.name).join(", ")} — Bias: ${candlePatternBias}. ${candlePatternBias==="BULLISH"?"Confirms long entries.":candlePatternBias==="BEARISH"?"Confirms short entries.":"Await directional resolve."}`);
  if(noTradeBlocked)lines.push(`🚫 EXECUTION: BLOCKED — ${noTradeFirstBlock||"Risk conditions not met"}. Preserve capital.`);
  else if(execIsActive){
    const isLong=execDir==="LONG";
    lines.push(`✅ EXECUTION: ${execDir} | Entry: ${isLong?execLongEntry:execShortEntry} | SL: ${isLong?execLongSL:execShortSL} | T1: ${isLong?execLongT1:execShortT1} (${execRrT1}R) | T2: ${isLong?execLongT2:execShortT2} (${execRrT2}R) | ${execLots} lot${execLots>1?"s":""} [${execSizeAdj}]`);
    lines.push(`🚫 Invalidation: Close ${isLong?"below":"above"} ${isLong?execLongInvalid:execShortInvalid} — exit without hesitation.`);

    lines.push(`⏳ EXECUTION: WAIT — ${regimeCode==="RB"?"Range bound":!mtfAligned?"MTF misaligned":trapMax>50?"Trap risk elevated":"Conditions developing"}. No forced trades.`);
  }
  return lines;
}

function computeAISignal({
  masterScore,regime,sweep,structure,mtf,trapProb,fiiAgg,
  atr,noTrade,session,premDisc,vwapBias,candle,absorb,deltaImb,
  atmStrike,vix,pcr,giftGap,liquiditySweep,oiChange,ivTrend,
  selectedAsset,capital,riskPct,
}){
  const atm=safeNum(atmStrike,24000);
  const sl_=atr.slBuffer||100;
  const conf=safeNum(masterScore.confidence,0);
  const execQ=safeNum(masterScore.execQuality,0);
  const bias=masterScore.bias;
  const isGo=masterScore.isGo;
  const trap=Math.max(safeNum(trapProb.bull,0),safeNum(trapProb.bear,0));
  const v=safeNum(vix,16);

  // ── CHECKLIST ──
  const checklist=[
    {label:"Structure confirmed (BOS/CHOCH)",  pass:structure.structureSignal!=="NONE"},
    {label:"Liquidity sweep identified",        pass:sweep.sweepType!=="NO SWEEP"},
    {label:"Session aligned for execution",     pass:!["DANGER","EXIT","POOR"].includes(session.current?.quality||"")},
    {label:"R:R ≥ 2.0 minimum",               pass:safeDiv(safeNum(atr.t2Buffer,200),Math.max(sl_,1))>=1.8},
    {label:"Emotional risk acceptable",         pass:trap<50&&v<20},
    {label:"MTF confluence aligned",            pass:mtf.aligned},
    {label:"Trap probability < 50%",            pass:trap<50},
    {label:"No-trade zone clear",              pass:!noTrade.blocked},
  ];
  const checksPassed=checklist.filter(c=>c.pass).length;
  const checksTotal=checklist.length;
  const checklistOk=checksPassed>=6;

  // ── CONFLUENCE SCORE ──
  let confluenceScore=0;
  if(structure.structureSignal!=="NONE")confluenceScore+=20;
  if(sweep.sweepType!=="NO SWEEP"&&sweep.sweepScore>50)confluenceScore+=18;
  if(mtf.aligned)confluenceScore+=16;
  if(fiiAgg.intensity==="AGGRESSIVE")confluenceScore+=12;
  if(absorb.val>50)confluenceScore+=10;
  if(Math.abs(deltaImb.imbRaw)>15)confluenceScore+=8;
  if(candle.patterns?.length>0)confluenceScore+=7;
  if(premDisc.zone!=="EQUILIBRIUM")confluenceScore+=5;
  if(trap<30)confluenceScore+=4;
  confluenceScore=clamp(confluenceScore,0,100);

  // ── DETERMINE DIRECTION ──
  let direction="NO TRADE";
  if(!checklistOk||noTrade.blocked||confluenceScore<55||conf<35){
    direction="NO TRADE";
  } else if(bias==="BULLISH"&&execQ>=55){
    direction="BUY";
  } else if(bias==="BEARISH"&&execQ>=55){
    direction="SELL";
  } else {
    direction="NO TRADE";
  }

  // ── ENTRY / SL / TARGETS ──
  const volAdj=v>20?1.5:v>17?1.25:1.0;
  const adjSL=Math.round(sl_*volAdj);
  let entry,sl,t1,t2,t3;
  if(direction==="BUY"){
    entry=atm-Math.round(adjSL*0.4);
    sl=entry-adjSL;
    t1=atm+Math.round(atr.t1Buffer*0.9);
    t2=atm+atr.t2Buffer;
    t3=atm+atr.t3Buffer;
  } else if(direction==="SELL"){
    entry=atm+Math.round(adjSL*0.4);
    sl=entry+adjSL;
    t1=atm-Math.round(atr.t1Buffer*0.9);
    t2=atm-atr.t2Buffer;
    t3=atm-atr.t3Buffer;
  } else {
    entry=atm; sl=0; t1=0; t2=0; t3=0;
  }

  const rrT1=direction!=="NO TRADE"?round2(safeDiv(Math.abs(t1-entry),Math.max(adjSL,1))):0;
  const rrT2=direction!=="NO TRADE"?round2(safeDiv(Math.abs(t2-entry),Math.max(adjSL,1))):0;
  const rrT3=direction!=="NO TRADE"?round2(safeDiv(Math.abs(t3-entry),Math.max(adjSL,1))):0;

  // ── CONFIDENCE METER ──
  const signalConf=direction==="NO TRADE"?0:Math.round(
    conf*0.45+execQ*0.25+confluenceScore*0.2+(checksPassed/checksTotal)*100*0.1
  );

  // ── SETUP TYPE ──
  let setupType="—";
  if(direction!=="NO TRADE"){
    if(sweep.sweepType!=="NO SWEEP"&&structure.structureSignal!=="NONE")setupType="Liquidity Sweep Reversal";
    else if(structure.structureSignal==="BOS BULLISH"||structure.structureSignal==="BOS BEARISH")setupType="BOS + Retest";
    else if(absorb.val>55&&sweep.sweepScore>40)setupType="Order Block Reaction";
    else if(mtf.aligned&&premDisc.zone!=="EQUILIBRIUM")setupType="Premium/Discount Fade";
    else if(candle.patterns?.some(p=>p.name?.includes("ENGULF")))setupType="Breaker Block Continuation";
    else setupType="Session Expansion Setup";
  }

  // ── AI NARRATIVE ──
  let aiNarrative="Insufficient confluence. Waiting for clean institutional setup.";
  if(direction==="BUY"){
    const sweepCtx=sweep.sweepType!=="NO SWEEP"?`${session.current?.label||"Session"} swept sell-side liquidity. `:"";
    const fiiCtx=fiiAgg.dir==="ACCUMULATING"?"FII accumulating aggressively. ":"";
    const structCtx=structure.structureSignal!=="NONE"?`${structure.structureSignal} confirmed. `:"";
    aiNarrative=`${sweepCtx}${structCtx}${fiiCtx}Bullish continuation probability elevated. Premium discount array favors long entries. Multi-timeframe bias aligned to upside.`;
  } else if(direction==="SELL"){
    const sweepCtx=sweep.sweepType!=="NO TRADE"&&sweep.sweepType!=="NO SWEEP"?`${session.current?.label||"Session"} swept buy-side liquidity. `:"";
    const fiiCtx=fiiAgg.dir==="DISTRIBUTING"?"FII distributing positions. ":"";
    const structCtx=structure.structureSignal!=="NONE"?`${structure.structureSignal} confirmed. `:"";
    aiNarrative=`${sweepCtx}${structCtx}${fiiCtx}Bearish continuation probability elevated. Institutions positioned short. Sell-side liquidity now in focus.`;
  } else if(noTrade.blocked){
    const firstBlock=noTrade.blocks?.[0]?.r||"Risk conditions not met";
    aiNarrative=`Execution blocked — ${firstBlock}. Preserve capital. No clean institutional setup identified across timeframes.`;
  } else if(confluenceScore<55){
    aiNarrative=`Confluence score ${confluenceScore}% — insufficient for institutional-grade entry. Minimum 55% required. Monitor for structure development.`;
  }

  // ── TRADE QUALITY ──
  let quality="Avoid";
  if(direction!=="NO TRADE"){
    if(signalConf>=78&&rrT2>=2.2&&checksPassed>=7)quality="A+";
    else if(signalConf>=65&&rrT2>=1.8&&checksPassed>=6)quality="A";
    else if(signalConf>=50&&rrT2>=1.5&&checksPassed>=5)quality="B";
    else quality="Avoid";
  }

  // ── SESSION CONTEXT ──
  const sessionLabel=session.current?.label||"";
  let sessionContext="Asian";
  if(sessionLabel==="PRIME"||sessionLabel==="POWER HOUR"||sessionLabel==="OPEN DRIVE")sessionContext="New York";
  else if(sessionLabel==="LONDON"||sessionLabel==="CHOP")sessionContext="London";
  else sessionContext="Asian";

  const dirColor=direction==="BUY"?T.green:direction==="SELL"?T.red:T.amber;
  const qualColor=quality==="A+"?T.cyan:quality==="A"?T.green:quality==="B"?T.amber:T.muted;
  const glowClass=direction==="BUY"?"signal-buy":direction==="SELL"?"signal-sell":"signal-notrade";

  return{
    direction,dirColor,glowClass,
    entry,sl,t1,t2,t3,
    rrT1,rrT2,rrT3,
    signalConf,confluenceScore,
    setupType,aiNarrative,
    quality,qualColor,
    sessionContext,
    checklist,checksPassed,checksTotal,checklistOk,
    adjSL,volAdj,
    isValid:direction!=="NO TRADE"&&quality!=="Avoid",
    selectedAsset,
  };
}


function useLiveSession(){
  const [session,setSession]=useState(()=>computeSession(new Date()));
  const iRef=useRef(null);
  useEffect(()=>{
    const tick=()=>setSession(computeSession(new Date()));
    const id=setTimeout(()=>{tick();iRef.current=setInterval(tick,60000);},msToNext());
    return()=>{clearTimeout(id);if(iRef.current){clearInterval(iRef.current);iRef.current=null;}};
  },[]);
  return session;
}

// ══════════════════════════════════════════════════════════
// JOURNAL HOOK — Full Persistent Memory System v2.0
// ══════════════════════════════════════════════════════════
const STORAGE_KEY   = "smOS-journal-v2-trades";
const NOTES_KEY     = "smOS-journal-v2-notes";
const PSYCH_KEY     = "smOS-journal-v2-psychology";
const REFLECT_KEY   = "smOS-journal-v2-reflections";
const CHECKLIST_KEY = "smOS-journal-v2-checklist";
const RISK_KEY      = "smOS-journal-v2-risk";
const SESSION_KEY   = "smOS-journal-v2-session";

// Safe localStorage helpers
function lsGet(key,fallback){try{const r=localStorage.getItem(key);return r!=null?JSON.parse(r):fallback;}catch(e){return fallback;}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){console.warn("smOS storage:",e);}}
function lsDel(key){try{localStorage.removeItem(key);}catch(e){}}

const DEFAULT_NOTES={marketBias:"",preMarket:"",keyLevels:"",riskNotes:"",sessionAnalysis:""};
const DEFAULT_PSYCH={emotionalState:"CALM",morningRoutine:"",mentalState:"",fearGreed:50,biasCheck:"",postSessionReview:""};
const DEFAULT_REFLECT={dailyReflection:"",lessonLearned:"",improvementPlan:"",gratitude:"",tomorrowFocus:""};
const DEFAULT_CHECKLIST={
  preTradeItems:[
    {id:"pt1",label:"Pre-market analysis complete",checked:false},
    {id:"pt2",label:"Key levels marked on chart",checked:false},
    {id:"pt3",label:"News/events checked",checked:false},
    {id:"pt4",label:"Risk per trade defined",checked:false},
    {id:"pt5",label:"Mental state assessed",checked:false},
    {id:"pt6",label:"No revenge trade intention",checked:false},
  ],
  postTradeItems:[
    {id:"po1",label:"Trade logged in journal",checked:false},
    {id:"po2",label:"Reviewed entry/exit",checked:false},
    {id:"po3",label:"Emotion during trade noted",checked:false},
    {id:"po4",label:"P&L recorded",checked:false},
    {id:"po5",label:"Lesson extracted",checked:false},
    {id:"po6",label:"Daily reflection written",checked:false},
  ]
};

function useJournal(){
  const [trades,setTrades]     = useState([]);
  const [notes,setNotes]       = useState(DEFAULT_NOTES);
  const [psych,setPsych]       = useState(DEFAULT_PSYCH);
  const [reflect,setReflect]   = useState(DEFAULT_REFLECT);
  const [checklist,setChecklist]= useState(DEFAULT_CHECKLIST);
  const [storageReady,setStorageReady] = useState(false);
  const [saveStatus,setSaveStatus]     = useState("idle"); // idle | saving | saved
  const saveTimerRef = useRef(null);

  const [form,setForm] = useState({type:"LONG",entry:"",sl:"",target:"",exit:"",setup:"BOS+MTF",emotion:"CALM",notes:""});
  const updateForm = useCallback((k,v)=>setForm(f=>({...f,[k]:v})),[]);

  // ── LOAD ALL DATA ON MOUNT ──
  useEffect(()=>{
    const savedTrades    = lsGet(STORAGE_KEY, []);
    const savedNotes     = lsGet(NOTES_KEY, DEFAULT_NOTES);
    const savedPsych     = lsGet(PSYCH_KEY, DEFAULT_PSYCH);
    const savedReflect   = lsGet(REFLECT_KEY, DEFAULT_REFLECT);
    const savedChecklist = lsGet(CHECKLIST_KEY, DEFAULT_CHECKLIST);

    if(Array.isArray(savedTrades)) setTrades(savedTrades);
    if(savedNotes)   setNotes(n=>({...DEFAULT_NOTES,...savedNotes}));
    if(savedPsych)   setPsych(p=>({...DEFAULT_PSYCH,...savedPsych}));
    if(savedReflect) setReflect(r=>({...DEFAULT_REFLECT,...savedReflect}));
    if(savedChecklist && savedChecklist.preTradeItems) setChecklist(savedChecklist);
    setStorageReady(true);
  },[]);

  // ── TRIGGER SAVE INDICATOR ──
  const triggerSave = useCallback(()=>{
    setSaveStatus("saving");
    if(saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(()=>setSaveStatus("saved"),400);
    const clearTimer = setTimeout(()=>setSaveStatus("idle"),2800);
    return ()=>clearTimeout(clearTimer);
  },[]);

  // ── AUTO-SAVE: TRADES ──
  useEffect(()=>{
    if(!storageReady) return;
    lsSet(STORAGE_KEY, trades);
    triggerSave();
  },[trades, storageReady]);

  // ── AUTO-SAVE: NOTES ──
  useEffect(()=>{
    if(!storageReady) return;
    lsSet(NOTES_KEY, notes);
    triggerSave();
  },[notes, storageReady]);

  // ── AUTO-SAVE: PSYCHOLOGY ──
  useEffect(()=>{
    if(!storageReady) return;
    lsSet(PSYCH_KEY, psych);
    triggerSave();
  },[psych, storageReady]);

  // ── AUTO-SAVE: REFLECTIONS ──
  useEffect(()=>{
    if(!storageReady) return;
    lsSet(REFLECT_KEY, reflect);
    triggerSave();
  },[reflect, storageReady]);

  // ── AUTO-SAVE: CHECKLIST ──
  useEffect(()=>{
    if(!storageReady) return;
    lsSet(CHECKLIST_KEY, checklist);
    triggerSave();
  },[checklist, storageReady]);

  // ── CHECKLIST HELPERS ──
  const toggleCheckItem = useCallback((section, id)=>{
    setChecklist(cl=>{
      const items = cl[section].map(item=>item.id===id?{...item,checked:!item.checked}:item);
      return {...cl,[section]:items};
    });
  },[]);

  const resetChecklist = useCallback(()=>{
    setChecklist(cl=>({
      preTradeItems:  cl.preTradeItems.map(i=>({...i,checked:false})),
      postTradeItems: cl.postTradeItems.map(i=>({...i,checked:false})),
    }));
  },[]);

  // ── TRADE ACTIONS ──
  const addTrade=useCallback((t)=>{
    const en=safeNum(t.entry,0),ex=safeNum(t.exit,0),tgt=safeNum(t.target,0),sl=safeNum(t.sl,0);
    const rawPnL=t.type==="LONG"?ex-en:en-ex;
    const pnl=Math.round(rawPnL*65),rr=round2(safeDiv(Math.abs(tgt-en),Math.max(Math.abs(sl-en),1)));
    const grade=rr>=2&&pnl>0?"A+":rr>=1.5&&pnl>0?"A":pnl>0?"B":rr>=1.5?"C":"D";
    setTrades(p=>[{...t,pnl,rr,result:pnl>=0?"WIN":"LOSS",date:new Date().toLocaleDateString("en-IN"),time:tNow(),id:Date.now(),grade},...p.slice(0,99)]);
  },[]);

  const removeTrade=useCallback((id)=>setTrades(p=>p.filter(t=>t.id!==id)),[]);

  const clearAll=useCallback(()=>{
    if(!window.confirm("Clear ALL journal data? This cannot be undone.")) return;
    setTrades([]);
    setNotes(DEFAULT_NOTES);
    setPsych(DEFAULT_PSYCH);
    setReflect(DEFAULT_REFLECT);
    setChecklist(DEFAULT_CHECKLIST);
    [STORAGE_KEY,NOTES_KEY,PSYCH_KEY,REFLECT_KEY,CHECKLIST_KEY].forEach(lsDel);
  },[]);

  // ── EXPORT BACKUP ──
  const exportBackup = useCallback(()=>{
    const data={
      version:"smOS-journal-v2",
      exportedAt:new Date().toISOString(),
      trades,notes,psych,reflect,checklist,
    };
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`SmartMoneyOS-Journal-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  },[trades,notes,psych,reflect,checklist]);

  // ── IMPORT BACKUP ──
  const importBackup = useCallback(()=>{
    const input=document.createElement("input");
    input.type="file";
    input.accept=".json";
    input.onchange=e=>{
      const file=e.target.files?.[0];
      if(!file) return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          if(!data.version?.startsWith("smOS-journal")){alert("Invalid backup file.");return;}
          if(!window.confirm(`Import backup from ${data.exportedAt?.slice(0,10)||"unknown date"}? Current data will be replaced.`)) return;
          if(Array.isArray(data.trades))   setTrades(data.trades);
          if(data.notes)     setNotes(n=>({...DEFAULT_NOTES,...data.notes}));
          if(data.psych)     setPsych(p=>({...DEFAULT_PSYCH,...data.psych}));
          if(data.reflect)   setReflect(r=>({...DEFAULT_REFLECT,...data.reflect}));
          if(data.checklist) setChecklist(cl=>data.checklist.preTradeItems?data.checklist:cl);
        }catch(err){alert("Failed to parse backup: "+err.message);}
      };
      reader.readAsText(file);
    };
    input.click();
  },[]);

  // ── STATS ──
  const stats=useMemo(()=>{
    if(!trades.length)return{wins:0,losses:0,winRate:0,avgRR:0,totalPnL:0,bestSetup:"—",worstEmotion:"—"};
    const wins=trades.filter(t=>t.result==="WIN").length;
    const sg={};trades.forEach(t=>{if(!sg[t.setup])sg[t.setup]={w:0,t:0};sg[t.setup].t++;if(t.result==="WIN")sg[t.setup].w++;});
    const bestSetup=Object.entries(sg).sort((a,b)=>safeDiv(b[1].w,b[1].t)-safeDiv(a[1].w,a[1].t))[0]?.[0]||"—";
    const eg={};trades.forEach(t=>{if(!eg[t.emotion])eg[t.emotion]={pnl:0};eg[t.emotion].pnl+=safeNum(t.pnl,0);});
    const worstEmotion=Object.entries(eg).sort((a,b)=>a[1].pnl-b[1].pnl)[0]?.[0]||"—";
    return{wins,losses:trades.length-wins,winRate:Math.round(safeDiv(wins,trades.length)*100),avgRR:round2(safeDiv(trades.reduce((a,t)=>a+safeNum(t.rr,0),0),trades.length)),totalPnL:trades.reduce((a,t)=>a+safeNum(t.pnl,0),0),bestSetup,worstEmotion};
  },[trades]);

  return{
    trades,form,updateForm,addTrade,removeTrade,clearAll,stats,storageReady,saveStatus,
    notes,setNotes,psych,setPsych,reflect,setReflect,
    checklist,toggleCheckItem,resetChecklist,
    exportBackup,importBackup,
  };
}

// ERROR BOUNDARY
// ══════════════════════════════════════════════════════════
class ErrorBoundary extends Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err)return(
      <div style={{background:T.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,padding:24}}>
        <Mono s={14} c={T.red} w={700}>⚠ Terminal Error</Mono>
        <Mono s={10} c={T.muted}>{this.state.err?.message}</Mono>
        <button onClick={()=>this.setState({err:null})} style={{background:T.cyan,color:T.bg,border:"none",borderRadius:4,padding:"8px 18px",cursor:"pointer",fontFamily:"IBM Plex Mono",fontWeight:700}}>Reset Terminal</button>
      </div>
    );
    return this.props.children;
  }
}

const ChecklistSection=memo(({title,items,onToggle,color=T.cyan})=>{
  const passed=items.filter(i=>i.checked).length;
  return(
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <Mono s={9} c={color} w={700} style={{letterSpacing:1.5,textTransform:"uppercase"}}>{title}</Mono>
        <Chip label={`${passed}/${items.length}`} color={passed===items.length?T.green:passed>0?T.amber:T.muted} size={7}/>
      </div>
      <MBar val={passed} max={items.length} color={passed===items.length?T.green:T.amber} h={3}/>
      <div style={{marginTop:6}}>
        {items.map(item=>(
          <div key={item.id} onClick={()=>onToggle(item.id)}
            style={{display:"flex",alignItems:"center",gap:9,padding:"6px 0",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}}>
            <div style={{
              width:15,height:15,borderRadius:3,flexShrink:0,
              background:item.checked?`${T.green}22`:`${T.red}10`,
              border:`1px solid ${item.checked?T.green:T.dim}50`,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:9,color:item.checked?T.green:T.dim,
              transition:"all .18s",
            }}>{item.checked?"✓":""}</div>
            <Mono s={9} c={item.checked?T.white:T.muted}>{item.label}</Mono>
          </div>
        ))}
      </div>
    </div>
  );
});

const ConfidenceMeter=memo(({value,color,size=120})=>{
  const pct=safePct(value);
  const r=44,cx=60,cy=60;
  const circ=2*Math.PI*r;
  const dash=circ*(pct/100);
  const gap=circ-dash;
  return(
    <div style={{position:"relative",width:size,height:size,margin:"0 auto"}}>
      <svg width={size} height={size} viewBox="0 0 120 120" style={{transform:"rotate(-90deg)"}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={T.border} strokeWidth={8}/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={8}
          strokeDasharray={`${dash} ${gap}`}
          strokeLinecap="round"
          style={{transition:"stroke-dasharray 1.2s cubic-bezier(.4,0,.2,1)",filter:`drop-shadow(0 0 6px ${color}88)`}}
        />
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <Mono s={20} c={color} w={800}>{pct}</Mono>
        <Mono s={7} c={T.muted}>CONF%</Mono>
      </div>
    </div>
  );
});

                <Mono s={8} c={item.ok?T.white:T.muted}>{item.rule}</Mono>
              </div>
            ))}
          </Card>
        </div>
      </div>

      {/* BOTTOM — PSYCHOLOGY WARNING BANNER */}
      {(!sig.isValid||sig.direction==="NO TRADE")&&(
        <div style={{marginTop:10,padding:"10px 16px",background:`${T.amber}08`,border:`1px solid ${T.amber}30`,borderRadius:6,display:"flex",alignItems:"flex-start",gap:10}}>
          <div style={{fontSize:14}}>🧠</div>
          <div>
            <div style={{fontSize:9,fontWeight:700,color:T.amber,letterSpacing:2,marginBottom:2}}>INSTITUTIONAL PSYCHOLOGY FILTER ACTIVE</div>
            <Sans s={10} c={T.muted} style={{lineHeight:1.6}}>
              No valid institutional setup detected. Avoid FOMO entries, revenge trades, or forced positions.
              Smart money waits for confluence — not price movement. Preserve capital for high-probability setups.
            </Sans>
          </div>
        </div>
      )}
    </div>
  );
});


// Mount the app
const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(SmartMoneyOS));
  </script>
</body>
